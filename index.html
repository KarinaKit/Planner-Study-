<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер задач с приоритетом</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js@11.1.0/public/assets/styles/choices.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
        <h2 class="title">To do list</h2>
        <label for="text-input">
            <input type="text" class="task-input" name="text">
        </label>
        <label for="prioritySelect">
            <select name="select" id="prioritySelect" class="prioritySelect">
                <option value="urgent">Срочное</option>
                <option value="important">Важное</option>
                <option value="normal">Обычное</option>
            </select>
        </label>

        <table class="task-table">
            <thead>
                <tr>
                    <th>Задача</th>
                    <th>Приоритет</th>
                    <th>Статус</th>
                    <th>Удалить</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <!-- Сюда JS будет добавлять строки <tr> -->
            </tbody>
        </table>

        <button class="addBtn">Добавить</button>
    </div>

    <div class="box-schedule">
        <h2 class="title">Planner study</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Математика</th>
                    <th>Обед</th>
                    <th>Аншлийский</th>
                    <th>Английский</th>
                    <th>TypeScript</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <tr>
                    <td>09:00 - 11:30</td>
                    <td>11:30 - 13:00</td>
                    <td>13:30 - 14:30</td>
                    <td>15:00 - 16:30</td>
                    <td>17:00 - 19:00</td>
                </tr>
            </tbody>
        </table>
        <input type="date" class="date-input">

        <ol class="task-item">

        </ol>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/choices.js@11.1.0/public/assets/scripts/choices.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script src="sandbox.js"></script>
</body>
</html>
